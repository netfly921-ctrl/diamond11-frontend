<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Pro - Diamond 11</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    
    <script>
    // ✅ SOUND MANAGER
    const soundManager = {
        win: null, lose: null, click: null,
        enabled: true,
        init() {
            this.enabled = localStorage.getItem('D11_SOUND') !== '0';
            this.win = new Audio('win.mp3');
            this.lose = new Audio('lose.mp3');
            this.click = new Audio('click.mp3');
            this.win.volume = 0.7;
            this.lose.volume = 0.6;
            this.click.volume = 0.4;
            this.updateIcon();
            
            // Unlock audio on first interaction
            document.addEventListener('click', () => {
                [this.win, this.lose, this.click].forEach(a => {
                    a.play().then(() => a.pause()).catch(() => {});
                });
            }, { once: true });
        },
        updateIcon() {
            const btn = document.getElementById('soundToggle');
            if (btn) {
                btn.innerHTML = this.enabled ? 
                    '<i class="fa-solid fa-volume-high"></i>' : 
                    '<i class="fa-solid fa-volume-xmark"></i>';
                btn.style.opacity = this.enabled ? '1' : '0.6';
            }
        },
        play(type) {
            if (!this.enabled || !this[type]) return;
            this[type].currentTime = 0;
            this[type].play().catch(e => console.log('Sound blocked'));
        }
    };

    window.toggleSound = function() {
        soundManager.enabled = !soundManager.enabled;
        localStorage.setItem('D11_SOUND', soundManager.enabled ? '1' : '0');
        soundManager.updateIcon();
        soundManager.play('click');
    };

    window.addEventListener('load', () => soundManager.init());
    </script>

    <style>
        :root {
            --bg: #0a0a12;
            --glass: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.1);
            --green: #00ff88;
            --red: #ff2a2a;
            --orange: #fb923c;
            --yellow: #ffd966;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            font-family: 'Segoe UI', sans-serif; 
            color: white; 
            padding-top: 55px;
            min-height: 100vh;
        }

        /* Top Bar */
        #topBar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 50px;
            background: #151520;
            border-bottom: 2px solid var(--orange);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 9999;
            font-weight: 700;
        }
        #topBar .bal { color: var(--yellow); font-size: 1.1rem; }

        /* Main Container */
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 12px;
        }

        /* Poster */
        .poster {
            height: 100px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(255,42,42,0.3), rgba(0,0,0,0.5)), 
                        url('aviator-poster.jpg') center/cover no-repeat;
            margin-bottom: 12px;
            position: relative;
            border: 1px solid var(--border);
        }
        .sound-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            cursor: pointer;
            display: grid;
            place-items: center;
            font-size: 1.2rem;
        }

        /* History */
        .history {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 8px 0;
            margin-bottom: 10px;
            scrollbar-width: none;
        }
        .history::-webkit-scrollbar { display: none; }
        .hist-item {
            flex-shrink: 0;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            border: 1px solid;
        }
        .hist-high { background: rgba(0,255,136,0.15); color: var(--green); border-color: rgba(0,255,136,0.3); }
        .hist-low { background: rgba(255,42,42,0.15); color: var(--red); border-color: rgba(255,42,42,0.3); }
        .hist-mid { background: rgba(251,146,60,0.15); color: var(--orange); border-color: rgba(251,146,60,0.3); }

        /* Game Screen */
        .game-box {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 16px;
            height: 240px;
            position: relative;
            overflow: hidden;
            margin-bottom: 12px;
        }
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .multiplier {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            font-weight: 900;
            text-shadow: 0 0 30px var(--green);
            z-index: 10;
            transition: all 0.3s;
        }
        .multiplier.waiting {
            font-size: 1.8rem;
            color: var(--yellow);
            text-shadow: none;
            animation: pulse 1s infinite;
        }
        .multiplier.crashed {
            color: var(--red) !important;
            text-shadow: 0 0 30px var(--red);
            animation: shake 0.5s;
        }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
        @keyframes shake { 0%,100%{transform:translate(-50%,-50%)} 25%{transform:translate(-52%,-50%)} 75%{transform:translate(-48%,-50%)} }

        /* Plane */
        .plane {
            position: absolute;
            font-size: 2.5rem;
            filter: drop-shadow(0 0 15px rgba(255,165,0,0.8));
            z-index: 5;
            transition: all 0.1s linear;
        }

        /* Status */
        .status {
            text-align: center;
            padding: 10px;
            font-weight: 700;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        /* Live Players */
        .live-box {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 12px;
        }
        .live-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #8b9bb4;
        }
        .live-count {
            color: var(--green);
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .live-list {
            font-size: 0.75rem;
            max-height: 80px;
            overflow-y: hidden;
        }
        .live-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
        }
        .live-item:last-child { border: none; }
        .live-name { color: #aaa; }
        .live-bet { color: var(--yellow); }
        .live-win { color: var(--green); font-weight: 700; }
        .live-loss { color: var(--red); }

        /* Bet Panels */
        .bet-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .bet-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px;
        }
        .bet-title {
            font-size: 0.75rem;
            color: #8b9bb4;
            text-transform: uppercase;
            margin-bottom: 6px;
            font-weight: 700;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 6px;
            outline: none;
        }
        input:focus { border-color: var(--orange); }
        
        .quick-btns {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
        }
        .quick-btns button {
            flex: 1;
            padding: 6px;
            background: rgba(255,255,255,0.06);
            border: none;
            border-radius: 6px;
            color: #aaa;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .quick-btns button:hover { background: rgba(255,255,255,0.12); color: white; }

        .auto-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
            font-size: 0.8rem;
        }
        .switch {
            width: 44px;
            height: 24px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }
        .switch.on { background: var(--green); }
        .switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        .switch.on::after { left: 23px; }

        .action-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-bet {
            background: linear-gradient(135deg, var(--orange), #ff6b00);
            color: black;
            box-shadow: 0 4px 15px rgba(251,146,60,0.3);
        }
        .btn-cash {
            background: linear-gradient(135deg, var(--green), #00aa55);
            color: black;
            box-shadow: 0 4px 15px rgba(0,255,136,0.3);
            animation: pulse-green 1s infinite;
        }
        @keyframes pulse-green { 0%,100%{box-shadow:0 4px 15px rgba(0,255,136,0.3)} 50%{box-shadow:0 4px 25px rgba(0,255,136,0.6)} }

        .toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(0,0,0,0.95);
            border: 1px solid var(--orange);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            z-index: 10000;
            transition: 0.3s;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div id="topBar">
    <div><i class="fa-solid fa-plane"></i> AVIATOR</div>
    <div class="bal">₹<span id="topBalance">0.00</span></div>
</div>

<div class="toast" id="toast"></div>

<div class="container">
    <!-- Poster -->
    <div class="poster">
        <button class="sound-btn" id="soundToggle" onclick="toggleSound()">
            <i class="fa-solid fa-volume-high"></i>
        </button>
    </div>

    <!-- History -->
    <div class="history" id="history"></div>

    <!-- Game Screen -->
    <div class="game-box">
        <canvas id="gameCanvas"></canvas>
        <div class="multiplier waiting" id="multiplier">WAITING...</div>
        <div class="plane" id="plane" style="display:none;">✈️</div>
    </div>

    <!-- Status -->
    <div class="status" id="status">Next round in 8s</div>

    <!-- Live Players -->
    <div class="live-box">
        <div class="live-header">
            <span>🔴 LIVE BETS</span>
            <span class="live-count"><div class="live-dot"></div><span id="playerCount">1,542</span> Online</span>
        </div>
        <div class="live-list" id="liveList"></div>
    </div>

    <!-- Bet Panels -->
    <div class="bet-area">
        <!-- Bet 1 -->
        <div class="bet-card">
            <div class="bet-title">Bet 1</div>
            <input type="number" id="bet1" value="10" min="10">
            <div class="quick-btns">
                <button onclick="quickBet(1, 0.5)">½</button>
                <button onclick="quickBet(1, 2)">2×</button>
                <button onclick="quickBet(1, 'max')">Max</button>
            </div>
            <input type="number" id="auto1" value="2.00" step="0.1" placeholder="Auto x">
            <div class="auto-row">
                <div class="switch" id="sw1" onclick="toggleAuto(1)"></div>
                <span>Auto Cashout</span>
            </div>
            <button class="action-btn btn-bet" id="btn1" onclick="placeBet(1)">BET</button>
            <button class="action-btn btn-cash" id="cash1" style="display:none;" onclick="cashout(1)">CASHOUT</button>
        </div>

        <!-- Bet 2 -->
        <div class="bet-card">
            <div class="bet-title">Bet 2</div>
            <input type="number" id="bet2" value="20" min="10">
            <div class="quick-btns">
                <button onclick="quickBet(2, 0.5)">½</button>
                <button onclick="quickBet(2, 2)">2×</button>
                <button onclick="quickBet(2, 'max')">Max</button>
            </div>
            <input type="number" id="auto2" value="3.00" step="0.1" placeholder="Auto x">
            <div class="auto-row">
                <div class="switch" id="sw2" onclick="toggleAuto(2)"></div>
                <span>Auto Cashout</span>
            </div>
            <button class="action-btn btn-bet" id="btn2" onclick="placeBet(2)">BET</button>
            <button class="action-btn btn-cash" id="cash2" style="display:none;" onclick="cashout(2)">CASHOUT</button>
        </div>
    </div>
</div>

<script>
// ===== CONFIG =====
const urlParams = new URLSearchParams(window.location.search);
const userToken = urlParams.get('token');
const API_BASE = 'https://diamond11-backend.onrender.com'; // Backend URL

// ===== STATE =====
let balance = 0;
let gameState = 'waiting'; 
let countdown = 8;
let currentMultiplier = 1.00;
let crashPoint = 2.00;
let animationId = null;
let startTime = 0;
let historyData = [];

let bets = {
    1: { active: false, amount: 0, cashed: false, auto: 0 },
    2: { active: false, amount: 0, cashed: false, auto: 0 }
};
let autoSettings = { 1: false, 2: false };

// ===== ELEMENTS =====
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const multEl = document.getElementById('multiplier');
const planeEl = document.getElementById('plane');
const statusEl = document.getElementById('status');

// Resize canvas
function resize() {
    const box = canvas.parentElement;
    canvas.width = box.clientWidth;
    canvas.height = box.clientHeight;
}
window.addEventListener('resize', resize);
resize();

// ===== WALLET FUNCTIONS =====
async function fetchBalance() {
    if (!userToken) return;
    try {
        const res = await fetch(`${API_BASE}/wallet/balance`, {
            headers: { 'Authorization': `Bearer ${userToken}` }
        });
        const data = await res.json();
        if (data.success) {
            balance = data.data.balance || 0;
            document.getElementById('topBalance').textContent = balance.toFixed(2);
        }
    } catch (err) {}
}

// ===== GAME LOGIC =====

// ✅ 40% WIN / 60% LOSS LOGIC (CHANGED HERE)
function generateCrashPoint() {
    const rand = Math.random();
    if (rand < 0.40) {
        // 40% chance - win/high multiplier (2x to 15x)
        return parseFloat((2 + Math.random() * 13).toFixed(2));
    } else {
        // 60% chance - loss/low multiplier (1.01x to 1.5x)
        return parseFloat((1.01 + Math.random() * 0.49).toFixed(2));
    }
}

// Start betting phase (8 seconds)
function startWaiting() {
    gameState = 'waiting';
    countdown = 8;
    multEl.className = 'multiplier waiting';
    multEl.textContent = `${countdown}s`;
    statusEl.textContent = 'Place your bets...';
    statusEl.style.color = 'var(--yellow)';
    planeEl.style.display = 'none';
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Reset buttons
    [1, 2].forEach(id => {
        if (!bets[id].active) {
            document.getElementById(`btn${id}`).style.display = 'block';
            document.getElementById(`btn${id}`).disabled = false;
            document.getElementById(`cash${id}`).style.display = 'none';
        }
    });

    const timer = setInterval(() => {
        countdown--;
        multEl.textContent = `${countdown}s`;
        if (countdown <= 0) {
            clearInterval(timer);
            startFlying();
        }
    }, 1000);
}

// Start flying
function startFlying() {
    gameState = 'flying';
    currentMultiplier = 1.00;
    crashPoint = generateCrashPoint();
    startTime = Date.now();
    
    multEl.className = 'multiplier';
    multEl.style.color = 'var(--green)';
    planeEl.style.display = 'block';
    statusEl.textContent = '✈️ FLYING...';
    statusEl.style.color = 'var(--green)';
    
    soundManager.play('click');

    // Activate cashout buttons for placed bets
    [1, 2].forEach(id => {
        if (bets[id].active && !bets[id].cashed) {
            document.getElementById(`btn${id}`).style.display = 'none';
            document.getElementById(`cash${id}`).style.display = 'block';
            document.getElementById(`cash${id}`).disabled = false;
            document.getElementById(`cash${id}`).textContent = 'CASHOUT';
        }
    });

    animate();
}

// Animation loop
function animate() {
    if (gameState !== 'flying') return;

    const elapsed = (Date.now() - startTime) / 1000;
    // Curve formula: starts slow, speeds up
    currentMultiplier = Math.pow(1.08, elapsed * 5);
    currentMultiplier = parseFloat(currentMultiplier.toFixed(2));

    // Update display
    multEl.textContent = currentMultiplier.toFixed(2) + 'x';
    
    // Color change
    if (currentMultiplier >= 5) multEl.style.color = '#ff00ff';
    else if (currentMultiplier >= 2) multEl.style.color = 'var(--yellow)';

    // Draw graph
    drawGraph(elapsed);

    // Check auto cashout
    [1, 2].forEach(id => {
        if (bets[id].active && !bets[id].cashed && autoSettings[id]) {
            const target = parseFloat(document.getElementById(`auto${id}`).value) || 1.5;
            if (currentMultiplier >= target) {
                cashout(id);
            }
        }
    });

    // Check crash
    if (currentMultiplier >= crashPoint) {
        doCrash();
        return;
    }

    animationId = requestAnimationFrame(animate);
}

// Draw the flight curve
function drawGraph(elapsed) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    for (let i = 0; i < canvas.width; i += 40) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
    }
    for (let i = 0; i < canvas.height; i += 40) {
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
    }

    // Draw curve
    ctx.beginPath();
    ctx.moveTo(0, canvas.height);
    
    const points = [];
    const steps = Math.min(elapsed * 60, 300); // Max points
    
    for (let i = 0; i <= steps; i++) {
        const t = i / 60;
        const x = (t / elapsed) * (canvas.width - 40) + 20;
        const m = Math.pow(1.08, t * 5);
        // Map multiplier to Y (inverse)
        const y = canvas.height - 30 - ((m - 1) / (crashPoint - 0.5)) * (canvas.height - 60);
        points.push({x, y});
    }
    
    if (points.length > 1) {
        ctx.moveTo(points[0].x, points[0].y);
        points.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.strokeStyle = '#00ff88';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur = 10;
        ctx.stroke();
        ctx.shadowBlur = 0;
        
        // Update plane position
        const last = points[points.length - 1];
        planeEl.style.left = (last.x - 20) + 'px';
        planeEl.style.top = (last.y - 20) + 'px';
    }
}

// Crash happened
function doCrash() {
    gameState = 'crashed';
    cancelAnimationFrame(animationId);
    
    multEl.className = 'multiplier crashed';
    multEl.textContent = crashPoint.toFixed(2) + 'x';
    planeEl.textContent = '💥';
    statusEl.textContent = `CRASHED @ ${crashPoint.toFixed(2)}x`;
    statusEl.style.color = 'var(--red)';
    
    soundManager.play('lose');
    
    // Handle losses
    [1, 2].forEach(id => {
        if (bets[id].active && !bets[id].cashed) {
            addLivePlayer(`You${id}`, bets[id].amount, 0);
            bets[id] = { active: false, amount: 0, cashed: false, auto: 0 };
            document.getElementById(`btn${id}`).style.display = 'block';
            document.getElementById(`cash${id}`).style.display = 'none';
        }
    });
    
    addHistory(crashPoint);
    
    // Next round after 3 seconds
    setTimeout(startWaiting, 3000);
}

// ===== BET FUNCTIONS =====

function quickBet(id, mult) {
    soundManager.play('click');
    const input = document.getElementById(`bet${id}`);
    if (mult === 'max') {
        input.value = Math.floor(balance);
    } else {
        input.value = Math.max(10, Math.floor((parseFloat(input.value) || 10) * mult));
    }
}

function toggleAuto(id) {
    soundManager.play('click');
    autoSettings[id] = !autoSettings[id];
    document.getElementById(`sw${id}`).classList.toggle('on', autoSettings[id]);
}

async function placeBet(id) {
    if (gameState !== 'waiting') {
        showToast('Wait for next round!');
        return;
    }
    if (bets[id].active) return;
    
    soundManager.play('click');
    const amount = parseFloat(document.getElementById(`bet${id}`).value);
    const autoVal = parseFloat(document.getElementById(`auto${id}`).value) || 2.0;
    
    if (amount < 10) return showToast('Min bet ₹10');
    if (amount > balance) return showToast('Insufficient balance!');
    
    try {
        const res = await fetch(`${API_BASE}/game/place-bet`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${userToken}`
            },
            body: JSON.stringify({
                gameCode: 'aviator',
                betAmount: amount
            })
        });
        
        const data = await res.json();
        if (!data.success) {
            showToast(data.message || 'Bet failed');
            return;
        }
        
        // Update balance
        balance = data.newBalance || (balance - amount);
        document.getElementById('topBalance').textContent = balance.toFixed(2);
        
        // Set bet state
        bets[id] = {
            active: true,
            amount: amount,
            cashed: false,
            auto: autoVal
        };
        
        document.getElementById(`btn${id}`).textContent = 'PLACED ✓';
        document.getElementById(`btn${id}`).disabled = true;
        
    } catch (err) {
        showToast('Network error!');
    }
}

async function cashout(id) {
    if (!bets[id].active || bets[id].cashed || gameState !== 'flying') return;
    
    soundManager.play('click');
    bets[id].cashed = true;
    const winAmount = parseFloat((bets[id].amount * currentMultiplier).toFixed(2));
    
    try {
        const res = await fetch(`${API_BASE}/game/cashout`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${userToken}`
            },
            body: JSON.stringify({
                gameCode: 'aviator',
                betAmount: bets[id].amount,
                winAmount: winAmount,
                multiplier: currentMultiplier
            })
        });
        
        const data = await res.json();
        if (data.success) {
            balance = data.newBalance;
            document.getElementById('topBalance').textContent = balance.toFixed(2);
        }
        
        // Update UI
        const btn = document.getElementById(`cash${id}`);
        btn.textContent = `✓ ${currentMultiplier.toFixed(2)}x`;
        btn.disabled = true;
        btn.style.background = '#444';
        
        addLivePlayer(`You${id}`, bets[id].amount, winAmount);
        soundManager.play('win');
        
    } catch (err) {
        console.error('Cashout error:', err);
    }
}

// ===== UI HELPERS =====

function addHistory(point) {
    historyData.unshift(point);
    if (historyData.length > 15) historyData.pop();
    
    const container = document.getElementById('history');
    container.innerHTML = '';
    historyData.forEach(p => {
        const div = document.createElement('div');
        div.className = 'hist-item ' + (p >= 2 ? 'hist-high' : p >= 1.5 ? 'hist-mid' : 'hist-low');
        div.textContent = p.toFixed(2) + 'x';
        container.appendChild(div);
    });
}

function addLivePlayer(name, bet, win) {
    const list = document.getElementById('liveList');
    const row = document.createElement('div');
    row.className = 'live-item';
    const winClass = win > 0 ? 'live-win' : 'live-loss';
    const winText = win > 0 ? `+₹${win}` : 'LOST';
    row.innerHTML = `<span class="live-name">${name}</span><span class="live-bet">₹${bet}</span><span class="${winClass}">${winText}</span>`;
    list.prepend(row);
    if (list.children.length > 5) list.lastChild.remove();
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== FAKE PLAYERS SYSTEM =====
const fakeNames = ['Raj**', 'Amit88', 'Priya*', 'Vikram', 'Neha**', 'DemoKing', 'Player1', 'Lucky7', 'SkyHigh', 'FlyBoy'];
let playerCount = 1542;

setInterval(() => {
    // Update count
    playerCount += Math.floor(Math.random() * 11) - 5;
    document.getElementById('playerCount').textContent = playerCount.toLocaleString();
    
    // Add fake bet during flying
    if (gameState === 'flying' && Math.random() > 0.6) {
        const name = fakeNames[Math.floor(Math.random() * fakeNames.length)];
        const bet = [10, 20, 50, 100, 200, 500][Math.floor(Math.random() * 6)];
        // Random cashout or loss
        setTimeout(() => {
            if (Math.random() > 0.7 && currentMultiplier < crashPoint) {
                const win = Math.floor(bet * currentMultiplier);
                addLivePlayer(name, bet, win);
            } else if (gameState === 'crashed') {
                addLivePlayer(name, bet, 0);
            }
        }, 1000 + Math.random() * 3000);
    }
}, 2000);
