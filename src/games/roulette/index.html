<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Roulette - Diamond 11</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
:root{--bg:#0f1923;--card:#1a2c38;--gold:#ffd966;--red:#ff3d3d;--black:#1a1a1a;--green:#22c55e;--text:#fff;}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding-top:45px;}
#liveBalanceBar{position:fixed;top:0;left:0;right:0;height:45px;background:#111827;color:white;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:14px;font-weight:600;z-index:999999;border-bottom:2px solid #ffd966;}
.balance-amount{color:#ffd966;font-size:16px;font-weight:700;}
.wrapper{width:100%;max-width:420px;padding:16px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#111827;margin:-16px -16px 16px;border-bottom:1px solid #1f2937;}
.topbar .title{font-weight:700;font-size:18px;}
.back-btn{cursor:pointer;font-size:20px;color:#9ca3af;}
.wheel-container{background:var(--card);border-radius:16px;padding:20px;text-align:center;margin-bottom:16px;}
.wheel{width:200px;height:200px;margin:0 auto;border-radius:50%;border:8px solid #ffd966;position:relative;overflow:hidden;transition:transform 3s ease-out;}
.wheel-segment{position:absolute;width:50%;height:50%;transform-origin:100% 100%;left:0;top:0;}
.wheel-pointer{position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:20px solid #ffd966;z-index:10;}
.result-display{font-size:32px;font-weight:700;margin:16px 0;height:40px;}
.result-display.red{color:var(--red);}
.result-display.black{color:var(--black);}
.result-display.green{color:var(--green);}
.bet-section{background:var(--card);border-radius:16px;padding:16px;margin-bottom:16px;}
.bet-options{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.bet-btn{padding:12px;border-radius:8px;border:2px solid transparent;font-weight:600;cursor:pointer;transition:.2s;font-size:14px;}
.bet-btn:active{transform:scale(.95);}
.bet-btn.red{background:var(--red);color:#fff;}
.bet-btn.black{background:var(--black);color:#fff;}
.bet-btn.green{background:var(--green);color:#fff;}
.bet-btn.selected{border-color:#ffd966;box-shadow:0 0 10px rgba(255,217,102,.5);}
.amount-selector{display:flex;gap:8px;align-items:center;margin-bottom:16px;}
.amount-input{flex:1;padding:12px;border-radius:8px;border:1px solid #374151;background:#020617;color:#fff;font-size:16px;text-align:center;}
.bet-pm{width:40px;height:40px;border-radius:8px;border:none;background:#374151;color:#fff;font-size:18px;cursor:pointer;font-weight:700;}
.bet-btn-main{width:100%;padding:14px;border-radius:12px;border:none;font-size:16px;font-weight:700;cursor:pointer;transition:.2s;}
.bet-btn-main:active{transform:scale(.97);}
.btn-bet{background:#22c55e;color:#fff;}
.btn-waiting{background:#374151;color:#9ca3af;}
.toast{position:fixed;top:100px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div id="liveBalanceBar"><div><i class="fa-solid fa-wallet"></i> Balance</div><div class="balance-amount">₹<span id="topBalanceText">0.00</span></div></div>
<div class="wrapper">
<div id="toast" class="toast"></div>
<div class="topbar"><i class="fa-solid fa-chevron-left back-btn" onclick="window.parent.location.href='/home'"></i><div class="title">Roulette</div><i class="fa-solid fa-circle-info" style="color:#9ca3af;"></i></div>
<div class="wheel-container">
  <div class="wheel-pointer"></div>
  <div class="wheel" id="wheel"></div>
  <div class="result-display" id="resultDisplay">Place your bet!</div>
</div>
<div class="bet-section">
  <p style="margin-bottom:12px;color:#9ca3af;font-size:14px;">Select Color:</p>
  <div class="bet-options">
    <button class="bet-btn red" onclick="selectBet('red',this)">RED (2x)</button>
    <button class="bet-btn green" onclick="selectBet('green',this)">GREEN (14x)</button>
    <button class="bet-btn black" onclick="selectBet('black',this)">BLACK (2x)</button>
  </div>
  <div class="amount-selector">
    <button class="bet-pm" onclick="adjustBet(-10)">−</button>
    <input type="number" id="betAmount" class="amount-input" value="10" min="10">
    <button class="bet-pm" onclick="adjustBet(10)">+</button>
  </div>
  <button class="bet-btn-main btn-bet" id="betBtn" onclick="placeBet()">PLACE BET</button>
</div>
</div>
<script>
const urlParams=new URLSearchParams(window.location.search);const userToken=urlParams.get('token');const gameCode='roulette';let balance=0;let selectedBet=null;let isSpinning=false;
const wheelNumbers=[0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,7,28,12,35,3,26,14,22,9,31,18,29,7,28,12,35,3,26];
const redNumbers=[1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
async function fetchBalance(){if(!userToken)return;try{const res=await fetch('/api/wallet/balance',{headers:{'Authorization':`Bearer ${userToken}`}});const data=await res.json();if(data.success){balance=data.data.balance;updateBalanceUI();}}catch(e){console.error('Balance error',e);}}
setInterval(fetchBalance,2000);fetchBalance();
function updateBalanceUI(){document.getElementById('topBalanceText').textContent=balance.toFixed(2);parent.postMessage({type:'UPDATE_BALANCE',payload:{newBalance:balance}},'*');}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
function selectBet(type,btn){if(isSpinning)return;selectedBet=type;document.querySelectorAll('.bet-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');}
function adjustBet(d){const inp=document.getElementById('betAmount');inp.value=Math.max(10,parseInt(inp.value||10)+d);}
function getNumberColor(n){if(n===0)return'green';return redNumbers.includes(n)?'red':'black';}
async function placeBet(){if(!selectedBet){showToast('Select a color first!');return;}if(isSpinning){showToast('Wait for spin to finish!');return;}const amount=parseInt(document.getElementById('betAmount').value)||10;if(amount<10){showToast('Min bet ₹10');return;}if(balance<amount){showToast('Insufficient balance!');return;}try{const res=await fetch('/api/game/place-bet',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${userToken}`},body:JSON.stringify({gameCode,betAmount:amount})});const data=await res.json();if(data.success){balance=data.newBalance;updateBalanceUI();spinWheel(amount);}else{showToast(data.message||'Bet failed');}}catch(e){showToast('Network error');console.error(e);}}
function spinWheel(betAmount){isSpinning=true;document.getElementById('betBtn').className='bet-btn-main btn-waiting';document.getElementById('betBtn').textContent='Spinning...';const winningNumber=wheelNumbers[Math.floor(Math.random()*wheelNumbers.length)];const winningColor=getNumberColor(winningNumber);const rotations=5+Math.random()*5;const degrees=rotations*360+wheelNumbers.indexOf(winningNumber)*(360/wheelNumbers.length);const wheel=document.getElementById('wheel');wheel.style.transform=`rotate(${degrees}deg)`;setTimeout(()=>{let winAmount=0;if(selectedBet===winningColor){if(winningColor==='green')winAmount=betAmount*14;else winAmount=betAmount*2;}if(winAmount>0){balance+=winAmount;updateBalanceUI();showToast(`🎉 You won ₹${winAmount}! (${winningNumber} ${winningColor.toUpperCase()})`);document.getElementById('resultDisplay').textContent=`WIN! ${winningNumber} ${winningColor.toUpperCase()}`;document.getElementById('resultDisplay').className=`result-display ${winningColor}`;fetch('/api/game/cashout',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${userToken}`},body:JSON.stringify({gameCode,betAmount,winAmount,multiplier:winAmount/betAmount})}).catch(()=>{});}else{showToast(`❌ You lost ₹${betAmount}! (${winningNumber} ${winningColor.toUpperCase()})`);document.getElementById('resultDisplay').textContent=`${winningNumber} ${winningColor.toUpperCase()}`;document.getElementById('resultDisplay').className=`result-display ${winningColor}`;}isSpinning=false;document.getElementById('betBtn').className='bet-btn-main btn-bet';document.getElementById('betBtn').textContent='PLACE BET';wheel.style.transition='none';wheel.style.transform='rotate(0deg)';setTimeout(()=>{wheel.style.transition='transform 3s ease-out';},50);},3000);}
</script>
</body>
</html>
