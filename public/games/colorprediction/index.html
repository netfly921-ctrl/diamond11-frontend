<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Prediction - Diamond 11</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    
    <script>
    // ✅ SOUND SYSTEM
    const soundManager = {
        win: null, lose: null, click: null, enabled: true,
        init() {
            this.enabled = localStorage.getItem('D11_SOUND') !== '0';
            this.win = new Audio('win.mp3'); this.lose = new Audio('lose.mp3'); this.click = new Audio('click.mp3');
            this.win.volume = 0.7; this.lose.volume = 0.6; this.click.volume = 0.4;
            this.updateBtn();
            document.addEventListener('click', () => { [this.win, this.lose, this.click].forEach(a => a.play().then(() => a.pause()).catch(()=>{})); }, { once: true });
        },
        updateBtn() { const b = document.getElementById('soundBtn'); if (b) b.innerHTML = this.enabled ? '<i class="fa-solid fa-volume-high"></i>' : '<i class="fa-solid fa-volume-xmark"></i>'; },
        play(t) { if (!this.enabled) return; try { this[t].currentTime = 0; this[t].play().catch(()=>{}); } catch(e){} }
    };
    window.toggleSound = () => { soundManager.enabled = !soundManager.enabled; localStorage.setItem('D11_SOUND', soundManager.enabled?'1':'0'); soundManager.updateBtn(); soundManager.play('click'); };
    addEventListener('load', () => soundManager.init());
    </script>

    <style>
        :root { --bg: #0a0a12; --glass: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1); --green: #00ff88; --red: #ff2a2a; --violet: #a855f7; --gold: #ffd966; --orange: #fb923c; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 15px; padding-top: 60px; }
        
        /* Top Bar */
        #topBar { position: fixed; top: 0; left: 0; right: 0; height: 50px; background: #151520; border-bottom: 2px solid var(--orange); display: flex; justify-content: space-between; align-items: center; padding: 0 16px; z-index: 999; font-weight: 700; }
        .bal-top { color: var(--gold); font-size: 1.1rem; }
        
        /* Main Box */
        .box { width: 100%; max-width: 420px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; padding: 20px; }
        
        /* Poster */
        .poster { height: 100px; border-radius: 16px; background: linear-gradient(135deg, rgba(255,42,42,0.2), rgba(0,255,136,0.2)), url('colorpred-poster.jpg') center/cover; margin-bottom: 15px; position: relative; border: 1px solid var(--border); }
        .sound-btn { position: absolute; top: 10px; right: 10px; width: 38px; height: 38px; background: rgba(0,0,0,0.6); border: 1px solid var(--border); border-radius: 10px; display: grid; place-items: center; cursor: pointer; font-size: 1.1rem; }
        
        /* Header */
        .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.3rem; font-weight: 900; background: linear-gradient(90deg, var(--green), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bal { color: var(--green); font-weight: 700; font-size: 1.1rem; }
        
        /* Game Info */
        .game-info { text-align: center; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 14px; margin-bottom: 15px; }
        .timer { font-size: 2.5rem; font-weight: 900; color: var(--gold); margin: 5px 0; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .round-num { font-size: 0.9rem; color: #8b9bb4; letter-spacing: 2px; }
        .result-display { font-size: 2rem; font-weight: 900; min-height: 40px; margin-top: 10px; text-shadow: 0 0 20px currentColor; }
        
        /* Colors */
        .color-green { color: var(--green) !important; text-shadow: 0 0 30px var(--green) !important; }
        .color-red { color: var(--red) !important; text-shadow: 0 0 30px var(--red) !important; }
        .color-violet { color: var(--violet) !important; text-shadow: 0 0 30px var(--violet) !important; }
        
        /* History */
        .history { display: flex; gap: 4px; overflow-x: auto; padding: 8px 0; margin-bottom: 15px; scrollbar-width: none; }
        .history::-webkit-scrollbar { display: none; }
        .h-item { flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%; display: grid; place-items: center; font-weight: 800; font-size: 0.7rem; }
        .h-green { background: var(--green); color: black; }
        .h-red { background: var(--red); color: white; }
        .h-violet { background: var(--violet); color: white; }
        .h-win { box-shadow: 0 0 10px currentColor; border: 2px solid white; }
        
        /* Color Buttons */
        .color-bet { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .bet-btn { padding: 15px; border: 3px solid transparent; border-radius: 12px; cursor: pointer; transition: 0.2s; font-weight: 800; text-transform: uppercase; font-size: 1rem; position: relative; overflow: hidden; }
        .bet-btn.green { background: rgba(0,255,136,0.15); border-color: var(--green); color: var(--green); }
        .bet-btn.red { background: rgba(255,42,42,0.15); border-color: var(--red); color: var(--red); }
        .bet-btn.violet { background: rgba(168,85,247,0.15); border-color: var(--violet); color: var(--violet); }
        .bet-btn:hover:not(:disabled) { transform: translateY(-3px); }
        .bet-btn.active { box-shadow: 0 0 25px currentColor; transform: scale(1.05); }
        .bet-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .payout { font-size: 0.65rem; opacity: 0.8; margin-top: 2px; }
        
        /* Bet Amount */
        .bet-controls { background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 14px; padding: 12px; margin-bottom: 15px; }
        .input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .input-row label { font-size: 0.75rem; color: #8b9bb4; min-width: 80px; }
        .input-row input { flex: 1; padding: 10px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 8px; color: white; font-weight: 700; outline: none; }
        .input-row input:focus { border-color: var(--gold); }
        .quick-bets { display: flex; gap: 5px; }
        .quick-bets button { flex: 1; padding: 6px; background: rgba(255,255,255,0.06); border: none; border-radius: 6px; color: #aaa; font-size: 0.8rem; cursor: pointer; }
        .quick-bets button:hover { background: rgba(255,255,255,0.12); color: white; }
        
        /* Submit Button */
        .submit-btn { width: 100%; padding: 16px; border: none; border-radius: 14px; background: linear-gradient(135deg, var(--orange), #ff6b00); color: black; font-weight: 900; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 25px rgba(255,167,38,0.4); transition: 0.2s; }
        .submit-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 35px rgba(255,167,38,0.6); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        /* Stats */
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; text-align: center; font-size: 0.75rem; }
        .stat { background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px; }
        .stat .v { font-weight: 800; color: var(--gold); font-size: 1rem; }
        .stat .l { color: #8b9bb4; font-size: 0.6rem; margin-top: 2px; }
        
        /* Toast */
        .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%) translateY(-120px); background: rgba(0,0,0,0.95); border: 1px solid var(--orange); padding: 12px 24px; border-radius: 12px; font-weight: 600; z-index: 10000; transition: 0.3s; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        
        /* Live Players */
        .live-box { background: rgba(0,0,0,0.25); border: 1px solid var(--border); border-radius: 10px; padding: 8px; margin-bottom: 12px; text-align: center; }
        .live-count { color: var(--green); font-weight: 800; font-size: 1rem; }
    </style>
<script src="/games/wallet.js"></script>
</head>
<body>

<div id="topBar"><div><i class="fa-solid fa-palette"></i> COLOR PRED</div><div class="bal-top">₹<span id="topBal">0.00</span></div></div>
<div class="toast" id="toast"></div>

<div class="box">
    <!-- Poster -->
    <div class="poster"><button class="sound-btn" id="soundBtn" onclick="toggleSound()"><i class="fa-solid fa-volume-high"></i></button></div>
    
    <!-- Header -->
    <div class="head"><div class="logo">🎨 COLOR PREDICTION</div><div class="bal">₹<span id="balance">0.00</span></div></div>
    
    <!-- Live Count -->
    <div class="live-box"><span class="live-count">🟢 <span id="playerCount">1,842</span> Playing Live!</span></div>
    
    <!-- Game Info -->
    <div class="game-info">
        <div class="round-num">ROUND #<span id="roundNum">2024001</span></div>
        <div class="timer" id="timer">8.00</div>
        <div class="result-display" id="resultText">PLACE YOUR BET</div>
    </div>
    
    <!-- History -->
    <div class="history" id="history"></div>
    
    <!-- Color Buttons -->
    <div class="color-bet">
        <button class="bet-btn green" id="btnGreen" onclick="selectColor('green')">
            GREEN
            <div class="payout">2×</div>
        </button>
        <button class="bet-btn violet" id="btnViolet" onclick="selectColor('violet')">
            VIOLET
            <div class="payout">7×</div>
        </button>
        <button class="bet-btn red" id="btnRed" onclick="selectColor('red')">
            RED
            <div class="payout">2×</div>
        </button>
    </div>
    
    <!-- Bet Controls -->
    <div class="bet-controls">
        <div class="input-row">
            <label>BET AMOUNT</label>
            <input type="number" id="betInput" value="10" min="10">
        </div>
        <div class="quick-bets">
            <button onclick="quickBet(10)">10</button>
            <button onclick="quickBet(50)">50</button>
            <button onclick="quickBet(100)">100</button>
            <button onclick="quickBet(500)">500</button>
            <button onclick="quickBet('half')">½</button>
            <button onclick="quickBet('double')">2×</button>
        </div>
    </div>
    
    <!-- Submit Button -->
    <button class="submit-btn" id="submitBtn" onclick="placeBet()">BET NOW</button>
    
    <!-- Stats -->
    <div class="stats">
        <div class="stat"><div class="v" id="statWin">0</div><div class="l">WINS</div></div>
        <div class="stat"><div class="v" id="statLoss">0</div><div class="l">LOSSES</div></div>
        <div class="stat"><div class="v" id="statProfit">₹0</div><div class="l">PROFIT</div></div>
    </div>
</div>

<script>
// ===== CONFIG =====
const params = new URLSearchParams(location.search);
const token = params.get('token');
const API = 'https://diamond11-backend.onrender.com';

// ===== STATE =====
let balance = 0;
let selectedColor = null;
let gameState = 'waiting'; // waiting, revealing, result
let countdown = 8;
let timerInterval = null;
let roundId = Math.floor(Math.random() * 900000 + 100000);
let history = [];
let wins = 0, losses = 0, profit = 0;

// Color weights for 40% win chance
const COLORS = ['green', 'red', 'violet'];
const WEIGHTS = { green: 35, red: 35, violet: 30 }; // 100 total

const submitBtn = document.getElementById('submitBtn');
const timerEl = document.getElementById('timer');
const resultText = document.getElementById('resultText');

// ===== WALLET =====
async function getBalance() {
    if (!token) return;
    try {
        const r = await fetch(`${API}/wallet/balance`, { headers: { 'Authorization': `Bearer ${token}` } });
        const d = await r.json();
        if (d.success) {
            balance = d.data.balance || 0;
            document.getElementById('balance').textContent = balance.toFixed(2);
            document.getElementById('topBal').textContent = balance.toFixed(2);
        }
    } catch(e) {}
}

// ===== COLOR SELECTION =====
window.selectColor = (c) => {
    if (gameState !== 'waiting') return showToast('Round started! Wait...');
    soundManager.play('click');
    selectedColor = c;
    ['green', 'red', 'violet'].forEach(color => {
        document.getElementById(`btn${color === 'violet' ? 'Violet' : color.charAt(0).toUpperCase() + color.slice(1)}`).classList.remove('active');
    });
    document.getElementById(`btn${c === 'violet' ? 'Violet' : c.charAt(0).toUpperCase() + c.slice(1)}`).classList.add('active');
};

// ===== QUICK BET =====
window.quickBet = (v) => {
    soundManager.play('click');
    const inp = document.getElementById('betInput');
    if (v === 'half') inp.value = Math.max(10, Math.floor(+inp.value / 2));
    else if (v === 'double') inp.value = Math.min(balance, Math.floor(+inp.value * 2));
    else inp.value = v;
};

// ===== MAIN GAME LOOP =====
function startGameLoop() {
    // Betting phase (8 seconds)
    gameState = 'waiting';
    countdown = 8;
    timerEl.className = 'timer';
    resultText.textContent = 'PLACE YOUR BET';
    resultText.style.color = 'var(--gold)';
    resultText.style.textShadow = '';
    submitBtn.disabled = false;
    submitBtn.textContent = 'BET NOW';
    
    [1, 2, 3].forEach((_, i) => {
        const btn = document.querySelectorAll('.bet-btn')[i];
        if(btn) btn.disabled = false;
    });
    
    timerInterval = setInterval(() => {
        countdown -= 0.05;
        timerEl.textContent = Math.max(0, countdown).toFixed(2);
        if (countdown <= 0) {
            clearInterval(timerInterval);
            revealResult();
        }
    }, 50);
}

// Reveal Winner
async function revealResult() {
    gameState = 'revealing';
    countdown = 0;
    timerEl.textContent = 'REVEALING...';
    submitBtn.disabled = true;
    [1, 2, 3].forEach((_, i) => {
        const btn = document.querySelectorAll('.bet-btn')[i];
        if(btn) btn.disabled = true;
    });
    
    // Show spinning animation
    let spinCount = 0;
    const spin = setInterval(() => {
        const randColor = COLORS[Math.floor(Math.random() * COLORS.length)];
        resultText.className = `result-display color-${randColor}`;
        resultText.textContent = randColor.toUpperCase();
        spinCount++;
        if (spinCount > 15) {
            clearInterval(spin);
            finalizeResult();
        }
    }, 100);
}

// ✅ 40% WIN / 60% LOSS LOGIC
async function finalizeResult() {
    const willWin = Math.random() < 0.40; // 40% winning chance
    
    // Generate result color with weights
    let randomNum = Math.random() * 100;
    let winningColor = 'red';
    if (randomNum < WEIGHTS.green) winningColor = 'green';
    else if (randomNum < WEIGHTS.green + WEIGHTS.red) winningColor = 'red';
    else winningColor = 'violet';
    
    // Force loss if not winning round
    if (!willWin && selectedColor) {
        // Make sure selectedColor doesn't match
        const losers = COLORS.filter(c => c !== selectedColor);
        winningColor = losers[Math.floor(Math.random() * losers.length)];
    }
    
    resultText.className = `result-display color-${winningColor}`;
    resultText.textContent = `${winningColor.toUpperCase()}!`;
    
    const bet = parseFloat(document.getElementById('betInput').value) || 10;
    const isWinner = selectedColor === winningColor;
    
    // Add to history
    history.unshift({ color: winningColor, win: isWinner, amount: selectedColor ? bet : 0 });
    if (history.length > 20) history.pop();
    updateHistory();
    
    if (selectedColor) {
        try {
            // Place bet
            const r = await fetch(`${API}/game/place-bet`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ gameCode: 'colorprediction', betAmount: bet })
            });
            const d = await r.json();
            if (d.success) {
                balance = d.newBalance;
                getBalance();
                
                if (isWinner) {
                    // WIN
                    const multiplier = winningColor === 'violet' ? 7 : 2;
                    const winAmount = bet * multiplier;
                    profit += (winAmount - bet);
                    wins++;
                    
                    // Cashout
                    await fetch(`${API}/game/cashout`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ gameCode: 'colorprediction', betAmount: bet, winAmount, multiplier })
                    });
                    
                    soundManager.play('win');
                    resultText.textContent = `${winningColor.toUpperCase()}! YOU WIN ₹${winAmount}`;
                    showToast(`🎉 Won ₹${winAmount}!`);
                } else {
                    // LOSS
                    profit -= bet;
                    losses++;
                    soundManager.play('lose');
                    resultText.textContent = `${winningColor.toUpperCase()}! YOU LOSE`;
                    showToast(`💸 Lost ₹${bet}`);
                }
                updateStats();
            }
        } catch(e) {
            console.error('Game error:', e);
        }
    } else {
        // No bet placed
        soundManager.play('win'); // Just play sound, no money involved
        resultText.textContent = `${winningColor.toUpperCase()}!`;
    }
    
    // Next round
    setTimeout(() => {
        roundId++;
        document.getElementById('roundNum').textContent = roundId;
        startGameLoop();
    }, 4000);
}

// ===== HELPERS =====
window.placeBet = () => {
    if (gameState !== 'waiting') return showToast('Waiting for next round!');
    if (!selectedColor) return showToast('Select a color first!');
    const bet = parseFloat(document.getElementById('betInput').value) || 10;
    if (bet < 10) return showToast('Min bet ₹10');
    if (bet > balance) return showToast('Low balance!');
    soundManager.play('click');
    showToast(`✓ Bet Placed on ${selectedColor.toUpperCase()}!`);
    submitBtn.disabled = true;
    submitBtn.textContent = 'BET PLACED ✓';
};

function updateHistory() {
    const h = document.getElementById('history');
    h.innerHTML = '';
    history.forEach(item => {
        const div = document.createElement('div');
        div.className = `h-item h-${item.color}${item.win ? ' h-win' : ''}`;
        div.textContent = item.color[0].toUpperCase();
        h.appendChild(div);
    });
}

function updateStats() {
    document.getElementById('statWin').textContent = wins;
    document.getElementById('statLoss').textContent = losses;
    document.getElementById('statProfit').textContent = (profit >= 0 ? '+' : '') + '₹' + profit.toFixed(0);
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

// FAKE PLAYERS
let playerCount = 1842;
setInterval(() => {
    playerCount += Math.floor(Math.random() * 11) - 5;
    document.getElementById('playerCount').textContent = playerCount.toLocaleString();
}, 2000);

// INIT
getBalance();
startGameLoop();
setInterval(getBalance, 5000);
</script>
</body>
</html>
