<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dice - Diamond 11</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    
    <script>
    const soundManager = {
        win: null, lose: null, click: null, enabled: true,
        init() {
            this.enabled = localStorage.getItem('D11_SOUND') !== '0';
            this.win = new Audio('win.mp3'); this.lose = new Audio('lose.mp3'); this.click = new Audio('click.mp3');
            this.win.volume = 0.7; this.lose.volume = 0.6; this.click.volume = 0.4;
            this.updateBtn();
            document.addEventListener('click', () => { [this.win, this.lose, this.click].forEach(a => a.play().then(() => a.pause()).catch(()=>{})); }, { once: true });
        },
        updateBtn() { const b = document.getElementById('soundBtn'); if (b) b.innerHTML = this.enabled ? '<i class="fa-solid fa-volume-high"></i>' : '<i class="fa-solid fa-volume-xmark"></i>'; },
        play(t) { if (!this.enabled) return; try { this[t].currentTime = 0; this[t].play().catch(()=>{}); } catch(e){} }
    };
    window.toggleSound = () => { soundManager.enabled = !soundManager.enabled; localStorage.setItem('D11_SOUND', soundManager.enabled?'1':'0'); soundManager.updateBtn(); soundManager.play('click'); };
    addEventListener('load', () => soundManager.init());
    </script>

    <style>
        :root { --bg: #0a0a0f; --glass: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1); --gold: #ffd700; --green: #00ff88; --red: #ff2a2a; --orange: #fb923c; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 15px; padding-top: 65px; }
        #topBar { position: fixed; top: 0; left: 0; right: 0; height: 50px; background: #14141f; border-bottom: 2px solid var(--orange); display: flex; justify-content: space-between; align-items: center; padding: 0 18px; z-index: 999; font-weight: 700; }
        .bal-top { color: var(--gold); font-size: 1.1rem; }
        .box { width: 100%; max-width: 420px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; padding: 20px; }
        .poster { height: 100px; border-radius: 16px; background: linear-gradient(135deg, rgba(251,146,60,0.2), rgba(0,0,0,0.6)), url('dice-poster.jpg') center/cover; margin-bottom: 15px; position: relative; border: 1px solid var(--border); }
        .sound-btn { position: absolute; top: 10px; right: 10px; width: 38px; height: 38px; background: rgba(0,0,0,0.6); border: 1px solid var(--border); border-radius: 10px; display: grid; place-items: center; cursor: pointer; font-size: 1.1rem; }
        .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.3rem; font-weight: 900; background: linear-gradient(90deg, var(--orange), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bal { color: var(--green); font-weight: 700; font-size: 1.1rem; }
        .dice-area { height: 160px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.3); border-radius: 16px; margin-bottom: 15px; border: 1px solid var(--border); }
        .dice-result { font-size: 4rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 30px var(--gold); }
        .dice-result.rolling { animation: shake 0.1s infinite; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 50%{transform:translateX(4px)} }
        .slider-box { margin-bottom: 15px; }
        .slider-header { display: flex; justify-content: space-between; font-size: 0.85rem; color: #8b9bb4; margin-bottom: 5px; font-weight: 600; }
        input[type="range"] { width: 100%; height: 8px; border-radius: 4px; background: rgba(0,0,0,0.4); outline: none; -webkit-appearance: none; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: var(--orange); box-shadow: 0 0 15px var(--orange); }
        .condition-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .cond-btn { padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: rgba(0,0,0,0.3); color: white; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .cond-btn.active { border-color: var(--orange); background: rgba(251,146,60,0.15); color: var(--orange); }
        .bet-box { background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 14px; padding: 12px; margin-bottom: 15px; }
        .bet-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .bet-row label { font-size: 0.75rem; color: #8b9bb4; min-width: 70px; }
        .bet-row input { flex: 1; padding: 10px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 8px; color: white; font-weight: 700; outline: none; }
        .quick { display: flex; gap: 5px; } .quick button { flex: 1; padding: 6px; background: rgba(255,255,255,0.06); border: none; border-radius: 6px; color: #aaa; font-size: 0.8rem; cursor: pointer; }
        .roll-btn { width: 100%; padding: 16px; border: none; border-radius: 14px; background: linear-gradient(135deg, var(--orange), #ff6b00); color: black; font-weight: 900; font-size: 1.2rem; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 25px rgba(251,146,60,0.4); transition: 0.2s; }
        .roll-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%) translateY(-120px); background: rgba(0,0,0,0.95); border: 1px solid var(--orange); padding: 12px 24px; border-radius: 12px; font-weight: 600; z-index: 1000; transition: 0.3s; }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
<script src="/games/wallet.js"></script>
</head>
<body>
    <div id="topBar"><div><i class="fa-solid fa-dice"></i> DICE</div><div class="bal-top">₹<span id="topBal">0.00</span></div></div>
    <div class="toast" id="toast"></div>
    <div class="box">
        <div class="poster"><button class="sound-btn" id="soundBtn" onclick="toggleSound()"><i class="fa-solid fa-volume-high"></i></button></div>
        <div class="head"><div class="logo">🎲 LUCKY DICE</div><div class="bal">₹<span id="balance">0.00</span></div></div>
        <div class="dice-area"><div class="dice-result" id="diceResult">50</div></div>
        <div class="slider-box"><div class="slider-header"><span>Target: <b id="targetLabel" style="color:var(--orange)">50</b></span><span>Multiplier: <b id="multLabel" style="color:var(--green)">1.96x</b></span></div><input type="range" id="targetRange" min="5" max="95" value="50" oninput="updateRange()"></div>
        <div class="condition-tabs"><button class="cond-btn active" id="btnOver" onclick="setCondition('over')">OVER 📈</button><button class="cond-btn" id="btnUnder" onclick="setCondition('under')">UNDER 📉</button></div>
        <div class="bet-box"><div class="bet-row"><label>BET AMOUNT</label><input type="number" id="betInput" value="10" min="10"></div><div class="quick"><button onclick="quickBet('half')">½</button><button onclick="quickBet('double')">2×</button><button onclick="quickBet(100)">100</button><button onclick="quickBet(500)">500</button></div></div>
        <button class="roll-btn" id="rollBtn" onclick="rollDice()">ROLL DICE</button>
    </div>

    <script>
        const params = new URLSearchParams(location.search); const token = params.get('token'); const API = 'https://diamond11-backend.onrender.com';
        let balance = 0, rolling = false, condition = 'over', targetValue = 50;

        async function getBalance() { if (!token) return; try { const r = await fetch(`${API}/wallet/balance`, { headers: { 'Authorization': `Bearer ${token}` } }); const d = await r.json(); if (d.success) { balance = d.data.balance || 0; document.getElementById('balance').textContent = balance.toFixed(2); document.getElementById('topBal').textContent = balance.toFixed(2); } } catch(e) {} }
        window.updateRange = () => { targetValue = parseInt(document.getElementById('targetRange').value); document.getElementById('targetLabel').textContent = targetValue; let chance = condition === 'over' ? (100 - targetValue) : targetValue; let mult = (98 / chance).toFixed(2); document.getElementById('multLabel').textContent = mult + 'x'; };
        window.setCondition = (c) => { condition = c; document.getElementById('btnOver').classList.toggle('active', c === 'over'); document.getElementById('btnUnder').classList.toggle('active', c === 'under'); updateRange(); soundManager.play('click'); };
        window.quickBet = (v) => { soundManager.play('click'); const inp = document.getElementById('betInput'); if (v === 'half') inp.value = Math.max(10, Math.floor(+inp.value / 2)); else if (v === 'double') inp.value = Math.min(balance, Math.floor(+inp.value * 2)); else inp.value = v; };

        window.rollDice = async () => {
            if (rolling) return;
            const bet = parseFloat(document.getElementById('betInput').value) || 10;
            if (bet < 10) return showToast('Min ₹10'); if (bet > balance) return showToast('Low balance');
            rolling = true; document.getElementById('rollBtn').disabled = true; soundManager.play('click');
            try { const r = await fetch(`${API}/game/place-bet`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ gameCode: 'dice', betAmount: bet }) }); const d = await r.json(); if (!d.success) throw 0; balance = d.newBalance; getBalance(); } catch(e) { rolling = false; document.getElementById('rollBtn').disabled = false; return showToast('Bet failed'); }
            
            const dice = document.getElementById('diceResult'); dice.className = 'dice-result rolling';
            
            // ✅ 40% WIN / 60% LOSS LOGIC
            const win = Math.random() < 0.40;
            let finalRoll;
            if (win) {
                finalRoll = condition === 'over' ? (targetValue + 1 + Math.floor(Math.random() * (100 - targetValue))) : (1 + Math.floor(Math.random() * (targetValue - 1)));
            } else {
                finalRoll = condition === 'over' ? (1 + Math.floor(Math.random() * targetValue)) : (targetValue + Math.floor(Math.random() * (100 - targetValue)));
            }

            setTimeout(async () => {
                dice.className = 'dice-result'; dice.textContent = finalRoll; rolling = false; document.getElementById('rollBtn').disabled = false;
                const chance = condition === 'over' ? (100 - targetValue) : targetValue;
                const mult = parseFloat((98 / chance).toFixed(2));
                const winAmount = bet * mult;

                if (win) {
                    soundManager.play('win'); showToast(`🎉 You Won ₹${winAmount.toFixed(0)}!`);
                    try { await fetch(`${API}/game/cashout`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ gameCode: 'dice', betAmount: bet, winAmount, multiplier: mult }) }); getBalance(); } catch(e) {}
                } else {
                    soundManager.play('lose'); showToast(`💸 You Lost ₹${bet}`);
                }
            }, 1500);
        };
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        getBalance(); updateRange(); setInterval(getBalance, 5000);
    </script>
</body>
</html>
