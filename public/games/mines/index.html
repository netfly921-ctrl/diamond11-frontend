<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mines - Diamond 11</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
:root{--bg:#0f1923;--card:#1a2c38;--card2:#213743;--gold:#ffd966;--green:#4caf50;--red:#ff3d3d;--text:#fff;--muted:rgba(255,255,255,.5);}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding-top:45px;}
#liveBalanceBar{position:fixed;top:0;left:0;right:0;height:45px;background:#111827;color:white;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:14px;font-weight:600;z-index:999999;border-bottom:2px solid #ffd966;}
.balance-amount{color:#ffd966;font-size:16px;font-weight:700;}
.wrapper{width:100%;max-width:420px;padding-bottom:20px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:linear-gradient(90deg,#7249ff,#a445ff);}
.topbar .title{font-weight:700;font-size:18px;color:#fff;}
.back-btn{cursor:pointer;font-size:20px;color:#fff;}
.settings-panel{padding:16px;}
.setting-card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;}
.setting-label{font-size:12px;color:var(--muted);margin-bottom:8px;}
.setting-row{display:flex;align-items:center;gap:8px;}
.setting-input{flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.3);color:#fff;font-size:16px;font-weight:600;text-align:center;outline:none;}
.pm-btn{width:40px;height:40px;border-radius:10px;border:none;background:var(--card2);color:#fff;font-size:18px;cursor:pointer;font-weight:700;}
.mine-selector{display:flex;gap:6px;flex-wrap:wrap;}
.mine-chip{padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:var(--card2);border:2px solid transparent;transition:.2s;color:#fff;}
.mine-chip.active{border-color:var(--gold);background:rgba(255,217,102,.15);color:var(--gold);}
.start-btn{width:100%;padding:14px;border-radius:12px;border:none;background:var(--green);color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:12px;}
.game-section{padding:0 16px 16px;display:none;}
.game-section.active{display:block;}
.game-info-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:12px;}
.info-box{background:var(--card);padding:8px 14px;border-radius:10px;color:#fff;}
.info-val{font-weight:700;color:var(--gold);font-size:16px;}
.mines-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px;}
.mine-cell{aspect-ratio:1;border-radius:12px;background:var(--card2);border:2px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:all .3s;color:#fff;}
.mine-cell:hover:not(.revealed){transform:scale(1.05);border-color:rgba(255,255,255,.2);}
.mine-cell.revealed{cursor:default;transform:none;}
.mine-cell.gem{background:rgba(76,175,80,.2);border-color:var(--green);}
.mine-cell.mine{background:rgba(255,61,61,.2);border-color:var(--red);}
.cashout-bar{background:var(--card);border-radius:14px;padding:16px;text-align:center;}
.cashout-multi{font-size:28px;font-weight:700;color:var(--gold);margin-bottom:4px;}
.cashout-amount{font-size:14px;color:var(--muted);margin-bottom:12px;}
.cashout-btn{width:100%;padding:14px;border-radius:12px;border:none;background:var(--gold);color:#333;font-size:16px;font-weight:700;cursor:pointer;}
.cashout-btn:disabled{opacity:.5;cursor:not-allowed;}
.game-result{display:none;text-align:center;padding:30px 16px;}
.game-result.active{display:block;}
.result-emoji{font-size:60px;margin-bottom:10px;}
.result-title{font-size:24px;font-weight:700;margin-bottom:6px;}
.result-amt{font-size:32px;font-weight:700;margin-bottom:20px;}
.play-again{padding:14px 50px;border-radius:12px;border:none;background:var(--green);color:#fff;font-size:16px;font-weight:700;cursor:pointer;}
.toast{position:fixed;top:100px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;}
.toast.show{opacity:1;}
.win-popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999999;align-items:center;justify-content:center;}
.win-popup-overlay.show{display:flex;}
.win-popup{background:linear-gradient(135deg,#1a2c38,#0f1923);border:3px solid #4caf50;border-radius:24px;padding:32px;text-align:center;max-width:320px;width:90%;animation:winPopIn .4s ease;box-shadow:0 0 50px rgba(76,175,80,.5);}
@keyframes winPopIn{0%{transform:scale(.5);opacity:0;}50%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}
.win-icon{font-size:64px;margin-bottom:16px;animation:winIconBounce .6s ease infinite;}
@keyframes winIconBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.win-title{font-size:28px;font-weight:800;color:#4caf50;margin-bottom:8px;text-transform:uppercase;}
.win-amount{font-size:36px;font-weight:800;color:#ffd966;margin-bottom:8px;text-shadow:0 0 20px rgba(255,217,102,.5);}
.win-multi{font-size:18px;color:#9ca3af;margin-bottom:20px;}
.win-btn{background:linear-gradient(135deg,#4caf50,#45a049);color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:.2s;}
.win-btn:active{transform:scale(.95);}
</style>
</head>
<body>
<div id="liveBalanceBar"><div><i class="fa-solid fa-wallet"></i> Balance</div><div class="balance-amount">₹<span id="topBalanceText">0.00</span></div></div>
<div id="winPopupOverlay" class="win-popup-overlay"><div class="win-popup"><div class="win-icon">💎</div><div class="win-title">YOU WIN!</div><div class="win-amount" id="winPopupAmount">+₹0.00</div><div class="win-multi" id="winPopupMulti">at 2.50x</div><button class="win-btn" onclick="closeWinPopup()">COLLECT</button></div></div>
<div class="wrapper">
<div id="toast" class="toast"></div>
<div class="topbar"><i class="fa-solid fa-chevron-left back-btn" onclick="window.parent.location.href='/home'"></i><div class="title">Mines</div><i class="fa-solid fa-clock-rotate-left" style="cursor:pointer;color:#fff;"></i></div>
<div id="settingsPanel" class="settings-panel">
  <div class="setting-card"><div class="setting-label">Bet Amount</div><div class="setting-row"><button class="pm-btn" onclick="adjustMBet(-10)">−</button><input type="number" class="setting-input" id="mBetInput" value="10"><button class="pm-btn" onclick="adjustMBet(10)">+</button></div><div style="display:flex;gap:6px;margin-top:8px;"><button class="pm-btn" style="flex:1;width:auto;font-size:11px;" onclick="document.getElementById('mBetInput').value=10">₹10</button><button class="pm-btn" style="flex:1;width:auto;font-size:11px;" onclick="document.getElementById('mBetInput').value=50">₹50</button><button class="pm-btn" style="flex:1;width:auto;font-size:11px;" onclick="document.getElementById('mBetInput').value=100">₹100</button><button class="pm-btn" style="flex:1;width:auto;font-size:11px;" onclick="document.getElementById('mBetInput').value=500">₹500</button></div></div>
  <div class="setting-card"><div class="setting-label">Number of Mines</div><div class="mine-selector" id="mineSelector"><div class="mine-chip" onclick="setMines(1,this)">1</div><div class="mine-chip" onclick="setMines(3,this)">3</div><div class="mine-chip active" onclick="setMines(5,this)">5</div><div class="mine-chip" onclick="setMines(10,this)">10</div><div class="mine-chip" onclick="setMines(15,this)">15</div><div class="mine-chip" onclick="setMines(20,this)">20</div></div></div>
  <button class="start-btn" id="startBtn" onclick="startMines()"><i class="fa-solid fa-play"></i> Start Game</button>
</div>
<div id="gameSection" class="game-section">
  <div class="game-info-bar"><div class="info-box">Mines: <span class="info-val" id="mineCountDisplay">5</span></div><div class="info-box">Gems: <span class="info-val" id="gemCount">0</span></div><div class="info-box">Profit: <span class="info-val" id="profitDisplay">₹0</span></div></div>
  <div class="mines-grid" id="minesGrid"></div>
  <div class="cashout-bar"><div class="cashout-multi" id="cashoutMulti">1.00x</div><div class="cashout-amount">Win: <span id="cashoutAmount">₹0.00</span></div><button class="cashout-btn" id="cashoutBtn" onclick="cashOutMines()" disabled>Cash Out</button></div>
</div>
<div id="gameResult" class="game-result"><div class="result-emoji" id="mResultEmoji">💎</div><div class="result-title" id="mResultTitle">You Win!</div><div class="result-amt" id="mResultAmt" style="color:var(--green);">+₹45.00</div><button class="play-again" onclick="resetMines()"><i class="fa-solid fa-redo"></i> Play Again</button></div>
</div>
<script>
const urlParams=new URLSearchParams(window.location.search);const userToken=urlParams.get('token');const gameCode='mines';let mBalance=0;let mBet=10;let mineCount=5;let grid=[];let revealed=0;let gameActive=false;let currentMulti=1;const GRID_SIZE=25;
async function fetchLiveBalance(){if(!userToken)return;try{const res=await fetch('/api/wallet/balance',{headers:{'Authorization':`Bearer ${userToken}`}});const data=await res.json();if(data.success){mBalance=data.data.balance;updateBalanceUI();}}catch(e){console.error('Balance fetch error',e);}}
setInterval(fetchLiveBalance,2000);fetchLiveBalance();
function updateBalanceUI(){document.getElementById('topBalanceText').textContent=mBalance.toFixed(2);parent.postMessage({type:'UPDATE_BALANCE',payload:{newBalance:mBalance}},'*');}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function showWinPopup(winAmount,multi){document.getElementById('winPopupAmount').textContent='+₹'+winAmount.toFixed(2);document.getElementById('winPopupMulti').textContent='at '+multi.toFixed(2)+'x';document.getElementById('winPopupOverlay').classList.add('show');}
function closeWinPopup(){document.getElementById('winPopupOverlay').classList.remove('show');}
function adjustMBet(amt){const inp=document.getElementById('mBetInput');inp.value=Math.max(10,parseInt(inp.value||10)+amt);}
function setMines(count,el){mineCount=count;document.querySelectorAll('.mine-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');}
function getMultiplier(gems,mines){let multi=1;for(let i=0;i<gems;i++){multi*=(GRID_SIZE-mines-i)>0?(GRID_SIZE-i)/(GRID_SIZE-mines-i):1;}return Math.round(multi*0.97*100)/100;}
async function startMines(){mBet=parseInt(document.getElementById('mBetInput').value)||10;if(mBet<10){showToast('Min bet ₹10');return;}if(mBalance<mBet){showToast('Insufficient balance!');return;}try{const res=await fetch('/api/game/place-bet',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${userToken}`},body:JSON.stringify({gameCode,betAmount:mBet})});const data=await res.json();if(data.success){mBalance=data.newBalance;updateBalanceUI();gameActive=true;revealed=0;currentMulti=1;grid=Array(GRID_SIZE).fill('gem');let minesPlaced=0;while(minesPlaced<mineCount){const pos=Math.floor(Math.random()*GRID_SIZE);if(grid[pos]==='gem'){grid[pos]='mine';minesPlaced++;}}const gridEl=document.getElementById('minesGrid');gridEl.innerHTML='';for(let i=0;i<GRID_SIZE;i++){const cell=document.createElement('div');cell.className='mine-cell';cell.textContent='';cell.onclick=()=>revealCell(i,cell);gridEl.appendChild(cell);}document.getElementById('mineCountDisplay').textContent=mineCount;document.getElementById('gemCount').textContent='0';document.getElementById('profitDisplay').textContent='₹0';document.getElementById('cashoutMulti').textContent='1.00x';document.getElementById('cashoutAmount').textContent='₹'+mBet.toFixed(2);document.getElementById('cashoutBtn').disabled=true;document.getElementById('settingsPanel').style.display='none';document.getElementById('gameSection').classList.add('active');document.getElementById('gameResult').classList.remove('active');}else{showToast(data.message||'Bet failed');}}catch(e){showToast('Network error');console.error(e);}}
function revealCell(index,cell){if(!gameActive||cell.classList.contains('revealed'))return;cell.classList.add('revealed');if(grid[index]==='mine'){cell.classList.add('mine');cell.textContent='💣';gameActive=false;revealAll();setTimeout(()=>{document.getElementById('gameSection').classList.remove('active');document.getElementById('mResultEmoji').textContent='💥';document.getElementById('mResultTitle').textContent='You hit a mine!';document.getElementById('mResultTitle').style.color='var(--red)';document.getElementById('mResultAmt').textContent='-₹'+mBet.toFixed(2);document.getElementById('mResultAmt').style.color='var(--red)';document.getElementById('gameResult').classList.add('active');},1000);}else{cell.classList.add('gem');cell.textContent='💎';revealed++;currentMulti=getMultiplier(revealed,mineCount);const winAmount=mBet*currentMulti;document.getElementById('gemCount').textContent=revealed;document.getElementById('cashoutMulti').textContent=currentMulti.toFixed(2)+'x';document.getElementById('cashoutAmount').textContent='₹'+winAmount.toFixed(2);document.getElementById('profitDisplay').textContent='₹'+(winAmount-mBet).toFixed(2);document.getElementById('cashoutBtn').disabled=false;if(revealed>=GRID_SIZE-mineCount){cashOutMines();}}}
function revealAll(){const cells=document.querySelectorAll('.mine-cell');cells.forEach((cell,i)=>{if(!cell.classList.contains('revealed')){cell.classList.add('revealed');if(grid[i]==='mine'){cell.classList.add('mine');cell.textContent='💣';}else{cell.classList.add('gem');cell.textContent='💎';}}});}
async function cashOutMines(){if(!gameActive)return;gameActive=false;const winAmount=Math.round(mBet*currentMulti*100)/100;try{const res=await fetch('/api/game/cashout',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${userToken}`},body:JSON.stringify({gameCode,betAmount:mBet,winAmount:winAmount,multiplier:currentMulti})});const data=await res.json();if(data.success){mBalance=data.newBalance;updateBalanceUI();revealAll();showWinPopup(winAmount,currentMulti);setTimeout(()=>{document.getElementById('gameSection').classList.remove('active');document.getElementById('mResultEmoji').textContent='💎';document.getElementById('mResultTitle').textContent='You Win!';document.getElementById('mResultTitle').style.color='var(--green)';document.getElementById('mResultAmt').textContent='+₹'+winAmount.toFixed(2);document.getElementById('mResultAmt').style.color='var(--green)';document.getElementById('gameResult').classList.add('active');},500);showToast('Cashed out ₹'+winAmount+'! 🎉');}else{showToast(data.message||'Cashout failed');}}catch(e){showToast('Network error');console.error(e);}}
function resetMines(){document.getElementById('settingsPanel').style.display='block';document.getElementById('gameSection').classList.remove('active');document.getElementById('gameResult').classList.remove('active');}
</script>
</body>
</html>
