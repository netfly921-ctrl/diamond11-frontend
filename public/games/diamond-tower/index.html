<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diamond Tower - Diamond 11</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

    <script src="../wallet.js"></script>

    <style>
        :root {
            --bg-1: #0a0015;
            --neon-orange: #ff6b00;
            --neon-yellow: #ffd700;
            --neon-green: #00ff88;
            --neon-red: #ff0044;
            --neon-purple: #a855f7;
            --neon-cyan: #00d4ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: radial-gradient(ellipse at top, #2a0a4e 0%, var(--bg-1) 60%);
            font-family: 'Rajdhani', sans-serif;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(168,85,247,0.15), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255,107,0,0.15), transparent 40%);
            z-index: 0;
            animation: bgPulse 4s ease-in-out infinite;
        }
        @keyframes bgPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            background: radial-gradient(circle, var(--neon-yellow), transparent);
            border-radius: 50%;
            opacity: 0.6;
            animation: float 15s linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
            10% { opacity: 0.6; transform: scale(1); }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100px) translateX(50px) scale(0); opacity: 0; }
        }
        #topBar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 55px;
            background: linear-gradient(180deg, rgba(20,10,40,0.95), rgba(10,0,20,0.98));
            backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--neon-orange);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 18px;
            z-index: 100;
            box-shadow: 0 5px 30px rgba(255,107,0,0.3);
        }
        #topBar .title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.1rem;
            background: linear-gradient(90deg, var(--neon-orange), var(--neon-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        #topBar .bal-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,215,0,0.1);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--neon-yellow);
            box-shadow: 0 0 15px rgba(255,215,0,0.3);
        }
        #topBar .bal-container i { color: var(--neon-yellow); }
        #topBar .bal { 
            color: var(--neon-yellow); 
            font-weight: 900; 
            font-size: 1rem;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        .container {
            position: relative;
            z-index: 2;
            max-width: 450px;
            margin: 0 auto;
            padding: 65px 12px 20px;
        }
        .stats-panel {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(30,15,60,0.9), rgba(20,10,40,0.9));
            border: 1px solid rgba(168,85,247,0.3);
            border-radius: 14px;
            padding: 12px 8px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shine 3s infinite;
        }
        @keyframes shine {
            0% { left: -100%; }
            50%, 100% { left: 100%; }
        }
        .stat-card .stat-label {
            font-size: 0.6rem;
            color: #a0a0c0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
            font-weight: 700;
        }
        .stat-card .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 900;
            text-shadow: 0 0 15px currentColor;
        }
        .stat-level .stat-value { color: var(--neon-orange); }
        .stat-mult .stat-value { color: var(--neon-yellow); }
        .stat-win .stat-value { color: var(--neon-green); }
        .stat-card.pulse {
            animation: statPulse 0.5s;
        }
        @keyframes statPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); border-color: var(--neon-green); box-shadow: 0 0 25px rgba(0,255,136,0.5); }
        }
        .tower-wrapper {
            background: linear-gradient(180deg, rgba(20,5,40,0.95), rgba(10,0,25,0.98));
            border: 2px solid rgba(255,107,0,0.3);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
            box-shadow: 
                inset 0 0 40px rgba(0,0,0,0.5),
                0 10px 40px rgba(0,0,0,0.5);
            max-height: 420px;
            overflow-y: auto;
        }
        .tower-wrapper::-webkit-scrollbar { width: 4px; }
        .tower-wrapper::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        .tower-wrapper::-webkit-scrollbar-thumb { 
            background: linear-gradient(var(--neon-orange), var(--neon-red));
            border-radius: 2px;
        }
        .floor {
            display: grid;
            grid-template-columns: 50px 1fr 1fr 1fr;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
            padding: 6px 4px;
            border-radius: 12px;
            transition: all 0.4s;
            opacity: 0.35;
        }
        .floor.active {
            opacity: 1;
            background: linear-gradient(90deg, 
                rgba(255,107,0,0.15) 0%, 
                rgba(255,215,0,0.1) 50%, 
                rgba(255,107,0,0.15) 100%);
            border: 1px solid rgba(255,107,0,0.5);
            box-shadow: 
                0 0 30px rgba(255,107,0,0.3),
                inset 0 0 20px rgba(255,107,0,0.1);
            animation: activePulse 2s ease-in-out infinite;
        }
        @keyframes activePulse {
            0%, 100% { box-shadow: 0 0 30px rgba(255,107,0,0.3), inset 0 0 20px rgba(255,107,0,0.1); }
            50% { box-shadow: 0 0 40px rgba(255,107,0,0.5), inset 0 0 25px rgba(255,107,0,0.2); }
        }
        .floor.completed {
            opacity: 0.6;
            background: linear-gradient(90deg, 
                rgba(0,255,136,0.08), 
                rgba(0,255,136,0.03));
            border: 1px solid rgba(0,255,136,0.2);
        }
        .floor-info {
            text-align: center;
            padding: 4px;
        }
        .floor-num {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 900;
            color: var(--neon-yellow);
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        .floor-mult {
            font-size: 0.65rem;
            color: #8b9bb4;
            font-weight: 700;
            margin-top: 2px;
        }
        .floor.completed .floor-num { color: var(--neon-green); }
        .floor.active .floor-mult { color: var(--neon-orange); font-weight: 900; }
        .tile {
            height: 55px;
            background: linear-gradient(135deg, #1a0a3e 0%, #0a0525 100%);
            border: 2px solid rgba(168,85,247,0.3);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            font-weight: 900;
        }
        .floor.active .tile {
            border-color: rgba(255,107,0,0.4);
            animation: tileGlow 1.5s ease-in-out infinite;
        }
        @keyframes tileGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(255,107,0,0.2); }
            50% { box-shadow: 0 0 25px rgba(255,107,0,0.4); }
        }
        .floor.active .tile:hover:not(.disabled) {
            transform: translateY(-4px) scale(1.05);
            border-color: var(--neon-yellow);
            box-shadow: 0 10px 25px rgba(255,215,0,0.4);
        }
        .tile.disabled { cursor: not-allowed; }
        .tile.safe {
            background: linear-gradient(135deg, #00ff88 0%, #00aa55 100%);
            border-color: var(--neon-green);
            color: #000;
            box-shadow: 0 0 30px rgba(0,255,136,0.7);
            animation: winFlash 0.6s;
        }
        @keyframes winFlash {
            0% { transform: scale(1); }
            30% { transform: scale(1.2) rotate(-5deg); }
            60% { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(1) rotate(0); }
        }
        .tile.bomb {
            background: linear-gradient(135deg, #ff0044 0%, #aa0022 100%);
            border-color: var(--neon-red);
            color: #fff;
            animation: explode 0.6s;
            box-shadow: 0 0 40px rgba(255,0,68,0.9);
        }
        @keyframes explode {
            0% { transform: scale(1); }
            20% { transform: scale(1.5) rotate(360deg); background: white; }
            40% { transform: scale(0.8); }
            60% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .tile.revealed-safe {
            background: rgba(0,255,136,0.1);
            border-color: rgba(0,255,136,0.3);
            color: var(--neon-green);
            opacity: 0.7;
        }
        .tile.revealed-bomb {
            background: rgba(255,0,68,0.15);
            border-color: rgba(255,0,68,0.4);
            color: var(--neon-red);
            opacity: 0.8;
        }
        .explosion-particle {
            position: absolute;
            width: 6px; height: 6px;
            background: var(--neon-red);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
        }
        .coin {
            position: absolute;
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 1000;
            animation: coinFall 2s linear;
        }
        @keyframes coinFall {
            0% { transform: translateY(-20px) rotate(0); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .bet-panel {
            background: linear-gradient(135deg, rgba(30,15,60,0.9), rgba(20,10,40,0.9));
            border: 1px solid rgba(168,85,247,0.3);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 12px;
        }
        .bet-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        .bet-label {
            font-size: 0.7rem;
            color: #a0a0c0;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            min-width: 60px;
        }
        .bet-input {
            flex: 1;
            padding: 12px 15px;
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(168,85,247,0.3);
            border-radius: 10px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            outline: none;
        }
        .bet-input:focus {
            border-color: var(--neon-orange);
            box-shadow: 0 0 20px rgba(255,107,0,0.3);
        }
        .quick-bets {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
        }
        .qbtn {
            padding: 8px 4px;
            background: rgba(168,85,247,0.15);
            border: 1px solid rgba(168,85,247,0.3);
            border-radius: 8px;
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .qbtn:hover { 
            background: rgba(168,85,247,0.3);
            border-color: var(--neon-purple);
            transform: translateY(-2px);
        }
        .actions {
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 14px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-start {
            background: linear-gradient(135deg, var(--neon-orange), #ff3300);
            color: white;
            box-shadow: 0 8px 25px rgba(255,107,0,0.5);
        }
        .btn-start:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255,107,0,0.7);
        }
        .btn-cash {
            background: linear-gradient(135deg, var(--neon-green), #00aa55);
            color: black;
            box-shadow: 0 8px 25px rgba(0,255,136,0.5);
            animation: cashPulse 1s ease-in-out infinite;
        }
        @keyframes cashPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .btn-cash:disabled { animation: none; }
        .toast {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: linear-gradient(135deg, rgba(20,10,40,0.98), rgba(10,0,25,0.98));
            border: 2px solid var(--neon-orange);
            padding: 14px 28px;
            border-radius: 30px;
            font-weight: 800;
            z-index: 10000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.win { border-color: var(--neon-green); color: var(--neon-green); }
        .toast.lose { border-color: var(--neon-red); color: var(--neon-red); }
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: 20px;
        }
        .modal.show { display: flex; animation: modalIn 0.3s; }
        @keyframes modalIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            background: linear-gradient(135deg, #1a0533, #0a0015);
            border: 3px solid var(--neon-yellow);
            border-radius: 24px;
            padding: 35px 30px;
            max-width: 340px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 60px rgba(255,215,0,0.4);
            animation: modalPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
        }
        @keyframes modalPop {
            0% { transform: scale(0.3) rotate(-20deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        .modal-content::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255,215,0,0.15), transparent);
            animation: rotate 4s linear infinite;
        }
        @keyframes rotate {
            0% { transform: rotate(0); }
            100% { transform: rotate(360deg); }
        }
        .modal-content > * { position: relative; z-index: 1; }
        .modal-icon {
            font-size: 5rem;
            margin-bottom: 15px;
            animation: iconBounce 0.6s ease-out;
        }
        @keyframes iconBounce {
            0% { transform: scale(0); }
            60% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: 3px;
        }
        .modal-title.win { color: var(--neon-green); text-shadow: 0 0 30px rgba(0,255,136,0.7); }
        .modal-title.lose { color: var(--neon-red); text-shadow: 0 0 30px rgba(255,0,68,0.7); }
        .modal-amount {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            color: var(--neon-yellow);
            margin: 20px 0;
            text-shadow: 0 0 30px rgba(255,215,0,0.6);
        }
        .modal-msg {
            color: #a0a0c0;
            font-size: 0.9rem;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .modal-btn {
            padding: 14px 40px;
            background: linear-gradient(135deg, var(--neon-orange), #ff3300);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 2px;
            box-shadow: 0 5px 20px rgba(255,107,0,0.5);
            transition: 0.3s;
            text-transform: uppercase;
        }
        .modal-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,107,0,0.7);
        }
        .empty-tower {
            text-align: center;
            padding: 60px 20px;
            color: #6a6a8a;
        }
        .empty-tower .icon {
            font-size: 4rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 20px rgba(168,85,247,0.5));
        }
        .empty-tower .msg {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            color: #8b9bb4;
        }
    </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div id="topBar">
    <div class="title">💎 DIAMOND TOWER</div>
    <div class="bal-container">
        <i class="fa-solid fa-coins"></i>
        <span class="bal">₹<span id="topBal">0.00</span></span>
    </div>
</div>

<div class="toast" id="toast"></div>

<div class="container">
    <div class="stats-panel">
        <div class="stat-card stat-level" id="levelCard">
            <div class="stat-label">Level</div>
            <div class="stat-value"><span id="currentLevel">0</span>/8</div>
        </div>
        <div class="stat-card stat-mult" id="multCard">
            <div class="stat-label">Multiplier</div>
            <div class="stat-value"><span id="currentMult">1.00</span>x</div>
        </div>
        <div class="stat-card stat-win" id="winCard">
            <div class="stat-label">Win</div>
            <div class="stat-value">₹<span id="winAmt">0</span></div>
        </div>
    </div>

    <div class="tower-wrapper" id="towerBox">
        <div class="empty-tower">
            <div class="icon">💎</div>
            <div class="msg">SET BET &<br>START GAME</div>
        </div>
    </div>

    <div class="bet-panel">
        <div class="bet-row">
            <span class="bet-label">Bet ₹</span>
            <input type="number" class="bet-input" id="betInput" value="10" min="10">
        </div>
        <div class="quick-bets">
            <button class="qbtn" onclick="quickBet(10)">10</button>
            <button class="qbtn" onclick="quickBet(50)">50</button>
            <button class="qbtn" onclick="quickBet(100)">100</button>
            <button class="qbtn" onclick="quickBet(500)">500</button>
            <button class="qbtn" onclick="quickBet('half')">½</button>
            <button class="qbtn" onclick="quickBet('double')">2×</button>
        </div>
    </div>

    <div class="actions">
        <button class="btn btn-start" id="startBtn" onclick="startGame()">
            💎 START GAME
        </button>
        <button class="btn btn-cash" id="cashBtn" onclick="cashOut()" style="display:none;">
            💰 CASH ₹<span id="cashAmt">0</span>
        </button>
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <div class="modal-icon" id="modalIcon">💥</div>
        <div class="modal-title" id="modalTitle">GAME OVER</div>
        <div class="modal-amount" id="modalAmount">₹0</div>
        <div class="modal-msg" id="modalMsg">Better luck next time!</div>
        <button class="modal-btn" onclick="closeModal()">▶ PLAY AGAIN</button>
    </div>
</div>

<script>
let balance = 0;
let currentLevel = 0;
let currentMultiplier = 1;
let currentBet = 0;
let gameActive = false;
let tower = [];

const MULTIPLIERS = [1.5, 2, 3, 5, 10, 20, 50, 100];
const TOTAL_LEVELS = 8;

let audioCtx;
try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}

function playBeep(freq, duration, type = 'sine') {
    if (!audioCtx) return;
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        osc.type = type;
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}
function playSafeSound() { playBeep(600, 0.1); setTimeout(() => playBeep(800, 0.1), 100); setTimeout(() => playBeep(1000, 0.15), 200); }
function playBombSound() { playBeep(200, 0.3, 'sawtooth'); setTimeout(() => playBeep(100, 0.3, 'sawtooth'), 100); }
function playCashSound() { playBeep(500, 0.08); setTimeout(() => playBeep(700, 0.08), 80); setTimeout(() => playBeep(900, 0.08), 160); setTimeout(() => playBeep(1200, 0.2), 240); }
function playClickSound() { playBeep(400, 0.05, 'square'); }

function initParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 20; i++) setTimeout(() => createParticle(container), i * 500);
    setInterval(() => createParticle(container), 800);
}
function createParticle(container) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 2;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (Math.random() * 10 + 10) + 's';
    container.appendChild(p);
    setTimeout(() => p.remove(), 20000);
}

function syncBalance() {
    balance = window.CasinoGame ? window.CasinoGame.balance : 0;
    document.getElementById('topBal').textContent = balance.toFixed(2);
}
function waitForWallet() {
    if (window.CasinoGame && window.CasinoGame.balance !== undefined) syncBalance();
    else setTimeout(waitForWallet, 500);
}
waitForWallet();

function generateTower() {
    tower = [];
    for (let i = 0; i < TOTAL_LEVELS; i++) {
        tower.push({ bombIndex: Math.floor(Math.random() * 3) });
    }
}
function renderTower() {
    const box = document.getElementById('towerBox');
    box.innerHTML = '';
    for (let i = TOTAL_LEVELS - 1; i >= 0; i--) {
        const floor = document.createElement('div');
        floor.className = 'floor';
        if (i === currentLevel) floor.classList.add('active');
        if (i < currentLevel) floor.classList.add('completed');
        floor.id = `floor-${i}`;
        floor.innerHTML = `
            <div class="floor-info">
                <div class="floor-num">${i + 1}</div>
                <div class="floor-mult">${MULTIPLIERS[i]}x</div>
            </div>
            <div class="tile" onclick="pickTile(${i}, 0)" data-floor="${i}" data-tile="0">?</div>
            <div class="tile" onclick="pickTile(${i}, 1)" data-floor="${i}" data-tile="1">?</div>
            <div class="tile" onclick="pickTile(${i}, 2)" data-floor="${i}" data-tile="2">?</div>
        `;
        box.appendChild(floor);
    }
    setTimeout(() => {
        const active = document.getElementById(`floor-${currentLevel}`);
        if (active) active.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
}
function updateStats(pulse = false) {
    document.getElementById('currentLevel').textContent = currentLevel;
    document.getElementById('currentMult').textContent = currentLevel > 0 ? MULTIPLIERS[currentLevel - 1].toFixed(2) : '1.00';
    const winAmt = currentLevel > 0 ? (currentBet * MULTIPLIERS[currentLevel - 1]).toFixed(0) : 0;
    document.getElementById('winAmt').textContent = winAmt;
    document.getElementById('cashAmt').textContent = winAmt;
    if (pulse) {
        document.querySelectorAll('.stat-card').forEach(c => c.classList.add('pulse'));
        setTimeout(() => document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('pulse')), 500);
    }
}
function quickBet(v) {
    playClickSound();
    const inp = document.getElementById('betInput');
    if (v === 'half') inp.value = Math.max(10, Math.floor(+inp.value / 2));
    else if (v === 'double') inp.value = Math.min(balance, Math.floor(+inp.value * 2));
    else inp.value = v;
}
async function startGame() {
    playClickSound();
    const bet = parseFloat(document.getElementById('betInput').value) || 10;
    if (bet < 10) return showToast('Min bet ₹10', 'lose');
    const success = await window.CasinoGame.placeBet(bet);
    if (!success) return showToast('Insufficient balance!', 'lose');
    syncBalance();
    currentBet = bet;
    currentLevel = 0;
    currentMultiplier = 1;
    gameActive = true;
    generateTower();
    renderTower();
    updateStats();
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('cashBtn').style.display = 'block';
    document.getElementById('cashBtn').disabled = true;
    showToast(`💎 GAME STARTED! ₹${bet}`);
}
function pickTile(floor, tile) {
    if (!gameActive || floor !== currentLevel) return;
    const tileEl = document.querySelector(`[data-floor="${floor}"][data-tile="${tile}"]`);
    if (tileEl.classList.contains('disabled')) return;
    document.querySelectorAll(`[data-floor="${floor}"]`).forEach(t => t.classList.add('disabled'));
    const isBomb = tile === tower[floor].bombIndex;
    if (isBomb) {
        tileEl.classList.add('bomb');
        tileEl.textContent = '💣';
        playBombSound();
        createExplosion(tileEl);
        document.querySelectorAll(`[data-floor="${floor}"]`).forEach((t, idx) => {
            if (idx !== tile) { t.classList.add('revealed-safe'); t.textContent = '💎'; }
        });
        setTimeout(() => gameOver(), 1000);
    } else {
        tileEl.classList.add('safe');
        tileEl.textContent = '💎';
        playSafeSound();
        createSparkles(tileEl);
        currentLevel++;
        currentMultiplier = MULTIPLIERS[currentLevel - 1];
        updateStats(true);
        document.getElementById('cashBtn').disabled = false;
        if (currentLevel >= TOTAL_LEVELS) setTimeout(() => cashOut(), 800);
        else setTimeout(() => renderTower(), 500);
    }
}
function createExplosion(el) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'explosion-particle';
        p.style.left = cx + 'px';
        p.style.top = cy + 'px';
        p.style.background = ['#ff0044', '#ff6b00', '#ffd700'][Math.floor(Math.random() * 3)];
        document.body.appendChild(p);
        const angle = (Math.PI * 2 * i) / 20;
        const velocity = 100 + Math.random() * 100;
        p.animate([
            { transform: 'translate(0, 0) scale(1)', opacity: 1 },
            { transform: `translate(${Math.cos(angle) * velocity}px, ${Math.sin(angle) * velocity}px) scale(0)`, opacity: 0 }
        ], { duration: 800 });
        setTimeout(() => p.remove(), 800);
    }
}
function createSparkles(el) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    for (let i = 0; i < 15; i++) {
        const p = document.createElement('div');
        p.className = 'explosion-particle';
        p.style.left = cx + 'px';
        p.style.top = cy + 'px';
        p.style.background = ['#00ff88', '#ffd700', '#00d4ff'][Math.floor(Math.random() * 3)];
        document.body.appendChild(p);
        const angle = Math.random() * Math.PI * 2;
        const velocity = 50 + Math.random() * 80;
        p.animate([
            { transform: 'translate(0, 0) scale(1)', opacity: 1 },
            { transform: `translate(${Math.cos(angle) * velocity}px, ${Math.sin(angle) * velocity - 50}px) scale(0)`, opacity: 0 }
        ], { duration: 600 });
        setTimeout(() => p.remove(), 600);
    }
}
function createCoinRain() {
    for (let i = 0; i < 30; i++) {
        setTimeout(() => {
            const coin = document.createElement('div');
            coin.className = 'coin';
            coin.textContent = ['💰', '🪙', '💎'][Math.floor(Math.random() * 3)];
            coin.style.left = Math.random() * 100 + '%';
            coin.style.top = '-30px';
            coin.style.animationDuration = (Math.random() * 1 + 1.5) + 's';
            document.body.appendChild(coin);
            setTimeout(() => coin.remove(), 3000);
        }, i * 80);
    }
}
async function cashOut() {
    if (!gameActive || currentLevel === 0) return;
    playClickSound();
    const winAmount = parseFloat((currentBet * currentMultiplier).toFixed(2));
    await window.CasinoGame.reportWin(winAmount);
    syncBalance();
    gameActive = false;
    playCashSound();
    createCoinRain();
    setTimeout(() => showModal(true, winAmount), 300);
}
function gameOver() {
    gameActive = false;
    tower.forEach((floor, idx) => {
        const bombTile = document.querySelector(`[data-floor="${idx}"][data-tile="${floor.bombIndex}"]`);
        if (bombTile && !bombTile.classList.contains('safe') && !bombTile.classList.contains('bomb')) {
            bombTile.textContent = '💣';
            bombTile.classList.add('revealed-bomb');
        }
    });
    setTimeout(() => showModal(false, 0), 800);
}
function showModal(isWin, amount) {
    const modal = document.getElementById('modal');
    if (isWin) {
        document.getElementById('modalIcon').textContent = '🎉';
        document.getElementById('modalTitle').textContent = 'YOU WON!';
        document.getElementById('modalTitle').className = 'modal-title win';
        document.getElementById('modalAmount').textContent = `+₹${amount.toFixed(0)}`;
        document.getElementById('modalMsg').textContent = `Level ${currentLevel} @ ${currentMultiplier}x`;
    } else {
        document.getElementById('modalIcon').textContent = '💥';
        document.getElementById('modalTitle').textContent = 'BOOM!';
        document.getElementById('modalTitle').className = 'modal-title lose';
        document.getElementById('modalAmount').textContent = `-₹${currentBet.toFixed(0)}`;
        document.getElementById('modalMsg').textContent = `Bomb at Level ${currentLevel + 1}`;
    }
    modal.classList.add('show');
}
function closeModal() {
    playClickSound();
    document.getElementById('modal').classList.remove('show');
    resetGame();
}
function resetGame() {
    currentLevel = 0;
    currentMultiplier = 1;
    currentBet = 0;
    gameActive = false;
    tower = [];
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('cashBtn').style.display = 'none';
    document.getElementById('towerBox').innerHTML = `
        <div class="empty-tower">
            <div class="icon">💎</div>
            <div class="msg">SET BET &<br>START GAME</div>
        </div>
    `;
    updateStats();
}
function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.classList.remove('show'), 2500);
}

resetGame();
initParticles();
</script>
</body>
</html>
