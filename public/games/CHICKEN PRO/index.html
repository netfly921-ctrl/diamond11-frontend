<!-- Chicken Game Final Version - Wallet Integrated -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Pro - Diamond 11</title>

    <!-- ✅ WALLET INTEGRATION -->
    <script src="../wallet.js"></script>

    <style>
        :root {
            --bg-dark: #050510;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-orange: #fb923c;
            --neon-green: #00ff88;
            --neon-red: #ff2a2a;
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 15px;
            padding-top: 65px;
            color: white;
        }

        /* ✅ ADDED: Top Bar */
        #topBar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 50px;
            background: #14141f;
            border-bottom: 2px solid var(--neon-orange);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 18px;
            z-index: 999;
            font-weight: 700;
        }
        .bal-top { color: #ffd700; font-size: 1.2rem; }

        .game-wrapper {
            width: 100%;
            max-width: 480px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 25px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-weight: 800;
            background: linear-gradient(90deg, var(--neon-orange), var(--neon-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .balance-display {
            color: var(--neon-green);
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .dish {
            aspect-ratio: 1;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .dish:hover:not(.disabled) {
            transform: scale(1.05);
            background: rgba(255,255,255,0.05);
        }

        .dish.chicken {
            background: rgba(0, 255, 136, 0.2);
            border-color: var(--neon-green);
        }

        .dish.bone {
            background: rgba(255, 42, 42, 0.2);
            border-color: var(--neon-red);
        }

        .dish.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            display: block;
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            outline: none;
        }

        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn-start {
            background: var(--neon-orange);
            color: black;
        }
        .btn-start:hover { transform: translateY(-2px); }
        .btn-start:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-cashout {
            background: var(--neon-green);
            color: black;
            display: none;
        }
        .btn-cashout:hover { transform: translateY(-2px); }

        .payout {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            margin: 10px 0;
            color: var(--neon-green);
            height: 28px;
        }

        .payout.lost {
            color: var(--neon-red);
        }

        /* ✅ ADDED: Toast */
        .toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: rgba(0,0,0,0.95);
            border: 1px solid var(--neon-orange);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            z-index: 1000;
            transition: 0.3s;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <!-- ✅ ADDED: Top Bar with Balance -->
    <div id="topBar">
        <div>🍗 CHICKEN PRO</div>
        <div class="bal-top">₹<span id="topBal">0.00</span></div>
    </div>

    <!-- ✅ ADDED: Toast -->
    <div class="toast" id="toast"></div>

    <div class="game-wrapper">
        <div class="header">
            <div class="logo">🍗 CHICKEN PRO</div>
            <div class="balance-display">💰 ₹<span id="balance">0.00</span></div>
        </div>

        <div class="payout" id="payout">Select bet & bones</div>

        <div class="grid" id="grid"></div>

        <div class="controls-grid">
            <div>
                <label>Bet Amount</label>
                <input type="number" id="betInput" value="10" min="10">
            </div>
            <div>
                <label>Number Of Bones</label>
                <select id="bonesSelect">
                    <option value="1">1 Bone</option>
                    <option value="3">3 Bones</option>
                    <option value="5">5 Bones</option>
                    <option value="10">10 Bones</option>
                </select>
            </div>
        </div>

        <div class="action-btns">
            <button class="btn-start" id="startBtn" onclick="startGame()">▶️ START GAME</button>
            <button class="btn-cashout" id="cashoutBtn" onclick="cashout()">💰 CASHOUT</button>
        </div>
    </div>

    <script>
        // ✅ WALLET INTEGRATION - No more direct API calls
        let balance = 0;
        let bet = 0;
        let bones = 1;
        let clicks = 0;
        let gameActive = false;
        let traps = [];

        // ✅ CHANGED: Balance now comes from wallet.js
        function syncBalance() {
            balance = window.CasinoGame ? window.CasinoGame.balance : 0;
            document.getElementById('balance').textContent = balance.toFixed(2);
            document.getElementById('topBal').textContent = balance.toFixed(2);
        }

        // ✅ Wait for wallet to initialize
        function waitForWallet() {
            if (window.CasinoGame && window.CasinoGame.balance !== undefined) {
                syncBalance();
                setInterval(syncBalance, 2000);
            } else {
                setTimeout(waitForWallet, 500);
            }
        }
        waitForWallet();

        // ✅ Toast function
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // Generate grid
        const grid = document.getElementById('grid');
        for (let i = 0; i < 25; i++) {
            const dish = document.createElement('div');
            dish.className = 'dish disabled';
            dish.innerText = '🍽️';
            dish.id = `dish-${i}`;
            dish.setAttribute('onclick', `clickDish(${i})`);
            grid.appendChild(dish);
        }

        // ✅ CHANGED: startGame is now async, uses wallet.js placeBet
        window.startGame = async function() {
            bet = parseFloat(document.getElementById('betInput').value);
            bones = parseInt(document.getElementById('bonesSelect').value);

            if (bet < 10) return showToast('Min bet ₹10');

            // ✅ WALLET: Place bet through wallet.js
            const success = await window.CasinoGame.placeBet(bet);
            if (!success) return showToast('Insufficient Balance!');

            // ✅ Sync balance after bet deduction
            syncBalance();

            clicks = 0;
            gameActive = true;

            // Generate traps
            traps = [];
            while (traps.length < bones) {
                const r = Math.floor(Math.random() * 25);
                if (!traps.includes(r)) traps.push(r);
            }

            // Reset UI
            for (let i = 0; i < 25; i++) {
                const d = document.getElementById(`dish-${i}`);
                d.className = 'dish';
                d.innerText = '🍽️';
            }

            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('cashoutBtn').style.display = 'block';
            document.getElementById('payout').className = 'payout';
            updatePayout();
        }

        window.clickDish = function(index) {
            if (!gameActive) return;
            const dish = document.getElementById(`dish-${index}`);
            if (dish.className !== 'dish') return;

            if (traps.includes(index)) {
                dish.innerText = '🦴';
                dish.classList.add('bone');
                gameOver(false);
            } else {
                dish.innerText = '🍗';
                dish.classList.add('chicken');
                clicks++;
                updatePayout();
            }
        }

        // ✅ CHANGED: cashout is now async, uses wallet.js reportWin
        window.cashout = async function() {
            if (!gameActive) return;

            const mult = getMultiplier(clicks);
            const winAmount = parseFloat((bet * mult).toFixed(2));

            // ✅ WALLET: Report win through wallet.js
            await window.CasinoGame.reportWin(winAmount);
            syncBalance();

            gameOver(true, winAmount);
            showToast(`🎉 Won ₹${winAmount.toFixed(2)}!`);
        }

        function gameOver(win, amount = 0) {
            gameActive = false;

            // Reveal all
            for (let i = 0; i < 25; i++) {
                const d = document.getElementById(`dish-${i}`);
                d.classList.add('disabled');
                if (traps.includes(i)) d.innerText = '🦴';
                else d.innerText = '🍗';
            }

            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('cashoutBtn').style.display = 'none';

            if (win) {
                document.getElementById('payout').textContent = `✅ WIN +₹${amount.toFixed(2)}`;
                document.getElementById('payout').className = 'payout';
            } else {
                document.getElementById('payout').textContent = `💥 YOU HIT A BONE! -₹${bet.toFixed(2)}`;
                document.getElementById('payout').className = 'payout lost';
                showToast(`💀 Lost ₹${bet.toFixed(2)}`);
            }

            // ✅ Always sync after game ends
            syncBalance();
        }

        function getMultiplier(c) {
            const n = 25;
            const b = bones;
            let p = 1;
            for (let i = 0; i < c; i++) {
                p *= (n - b - i) / (n - i);
            }
            return parseFloat((0.95 / p).toFixed(2));
        }

        function updatePayout() {
            const nextMult = getMultiplier(clicks + 1);
            const currentMult = getMultiplier(clicks);
            const cashoutAmount = (bet * currentMult).toFixed(2);
            document.getElementById('payout').textContent = `Next: ${nextMult}x | Cashout: ₹${cashoutAmount}`;
        }
    </script>
</body>
</html>
